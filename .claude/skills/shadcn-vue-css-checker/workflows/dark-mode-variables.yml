name: dark-mode-variables
description: 检查深色模式 CSS 变量实现

workflow:
  - name: 深色模式选择器检查
    description: 验证深色模式的选择器和变量覆盖
    checks:
      - name: 深色模式选择器 ⭐⭐⭐⭐⭐
        check: |
          检查深色模式选择器定义：
          - [ ] 使用 .dark 类选择器
          - [ ] 选择器位置正确（在 :root 之后）
          - [ ] 选择器优先级适当

      - name: 深色模式变量完整性 ⭐⭐⭐⭐⭐
        check: |
          检查深色模式变量是否完整覆盖：
          - [ ] 所有基础变量都有对应的深色版本
          - [ ] 变量命名与基础版本一致
          - [ ] 没有遗漏的变量

  - name: 深色模式变量值检查
    description: 检查深色模式变量的具体值
    checks:
      - name: 背景与前景深色值 ⭐⭐⭐⭐⭐
        check: |
          检查深色模式背景和前景：
          - [ ] --background: 222.2 84% 4.9%;
          - [ ] --foreground: 210 40% 98%;

      - name: 卡片深色值 ⭐⭐⭐⭐
        check: |
          检查深色模式卡片变量：
          - [ ] --card: 222.2 84% 4.9%;
          - [ ] --card-foreground: 210 40% 98%;

      - name: 主色系深色值 ⭐⭐⭐⭐⭐
        check: |
          检查深色模式主色系：
          - [ ] --primary: 210 40% 98%;
          - [ ] --primary-foreground: 222.2 47.4% 11.2%;

      - name: 次要色系深色值 ⭐⭐⭐⭐
        check: |
          检查深色模式次要色系：
          - [ ] --secondary: 217.2 32.6% 17.5%;
          - [ ] --secondary-foreground: 210 40% 98%;

      - name: 边框深色值 ⭐⭐⭐⭐
        check: |
          检查深色模式边框变量：
          - [ ] --border: 217.2 32.6% 17.5%;
          - [ ] --input: 217.2 32.6% 17.5%;
          - [ ] --ring: 212.7 26.8% 83.9%;

  - name: 深色模式切换测试
    description: 测试深色模式切换功能
    checks:
      - name: 切换平滑性 ⭐⭐⭐
        check: |
          检查深色模式切换：
          - [ ] 切换时无闪烁
          - [ ] 过渡效果平滑
          - [ ] 颜色对比度适当

      - name: 系统偏好支持 ⭐⭐⭐⭐
        check: |
          检查系统偏好支持：
          - [ ] 支持 prefers-color-scheme
          - [ ] 手动切换优先级正确
          - [ ] 状态持久化
