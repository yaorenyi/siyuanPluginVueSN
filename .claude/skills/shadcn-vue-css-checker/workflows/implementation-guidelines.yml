name: implementation-guidelines
description: 检查 CSS 变量在实际组件中的使用规范

workflow:
  - name: 组件样式实现检查
    description: 检查组件中 CSS 变量的使用
    checks:
      - name: 组件变量继承 ⭐⭐⭐⭐
        check: |
          检查组件变量继承关系：
          - [ ] 组件使用基础 CSS 变量
          - [ ] 自定义组件变量继承基础变量
          - [ ] 变量覆盖逻辑合理

      - name: 颜色使用规范 ⭐⭐⭐⭐⭐
        check: |
          检查颜色使用规范：
          - [ ] 使用 CSS 变量而非硬编码颜色
          - [ ] 颜色对比度符合 WCAG 标准
          - [ ] 语义化颜色使用正确

      - name: 间距和尺寸 ⭐⭐⭐
        check: |
          检查间距和尺寸规范：
          - [ ] 使用 CSS 变量定义间距
          - [ ] 尺寸单位一致（rem/px）
          - [ ] 响应式断点使用正确

  - name: 性能优化检查
    description: 检查 CSS 实现的性能优化
    checks:
      - name: 变量优化 ⭐⭐⭐
        check: |
          检查变量优化：
          - [ ] 避免不必要的变量嵌套
          - [ ] 变量作用域合理
          - [ ] 减少重复变量定义

      - name: 选择器性能 ⭐⭐⭐
        check: |
          检查选择器性能：
          - [ ] 避免过于复杂的选择器
          - [ ] 减少特异性冲突
          - [ ] 使用类选择器而非标签选择器

  - name: 维护性检查
    description: 检查代码的可维护性
    checks:
      - name: 代码组织 ⭐⭐⭐⭐
        check: |
          检查代码组织：
          - [ ] CSS 文件结构清晰
          - [ ] 变量分组合理
          - [ ] 注释完整

      - name: 扩展性 ⭐⭐⭐⭐
        check: |
          检查扩展性：
          - [ ] 易于添加新主题
          - [ ] 支持自定义变量
          - [ ] 组件样式解耦
